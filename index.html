<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LalaStreaming | Tienda Digital</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="hero">
  <nav>
    <img src="logo-lalastreaming.png" class="logo" alt="LalaStreaming">
    <div class="nav-actions">
      <button id="currencyBtn">USD</button>
      <a id="waTop" target="_blank">WhatsApp</a>
    </div>
  </nav>
  <section class="hero-content">
    <div>
      <span class="badge">Catálogo digital</span>
      <h1 id="title">LalaStreaming</h1>
      <h2 id="subtitle">Plataformas digitales al mejor precio</h2>
      <p id="description">Compra fácil, rápido y con soporte.</p>
      <a href="#catalogo" class="primary">Ver plataformas</a>
    </div>
    <img src="logo-lalastreaming.png" class="big-logo" alt="LalaStreaming">
  </section>
</header>

<main>
  <section id="catalogo" class="section">
    <h2>Plataformas disponibles</h2>
    <p class="muted">Haz clic en cualquier servicio para ver detalles.</p>
    <div id="grid" class="grid"></div>
  </section>

  <section class="terms">
    <h2>Términos y condiciones</h2>
    <div id="terms"></div>
  </section>
</main>

<div id="modal" class="modal">
  <div class="modal-card">
    <button id="closeModal" class="close">×</button>
    <img id="mImg" class="modal-img" alt="">
    <h2 id="mName"></h2>
    <p id="mDesc"></p>
    <strong id="mPrice"></strong>
    <a id="mWa" target="_blank">Comprar por WhatsApp</a>
  </div>
</div>

<a id="floatWa" class="float-wa" target="_blank">💬</a>

<footer>
  <p>© 2026 LalaStreaming</p>
  <a href="admin.html" class="hidden-admin">Panel</a>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
